name: pokemon_app
description: Prueba técnica Flutter - Clean Architecture + GetX + Firebase + Hive
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  get: ^4.7.3
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  dio: ^5.9.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  equatable: ^2.0.5
  connectivity_plus: ^7.0.0
  intl: ^0.20.0
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  hive_ce_generator: ^1.11.2
  very_good_analysis: ^10.0.0
  flutter_native_splash: ^2.4.6
  flutter_launcher_icons: ^0.14.4
  rename: ^3.1.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/logo_pokeball.png
  android: true
  ios: true
  web: false
  fullscreen: true

  android_12:
    color: "#ffffff"
    image: assets/images/logo_pokeball.png

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_pokeball.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/logo_pokeball.png"