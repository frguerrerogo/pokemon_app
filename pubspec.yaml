name: pokemon_app
description: Prueba técnica Flutter - Clean Architecture + GetX + Firebase + Hive
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  get: ^4.7.3
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  dio: ^5.9.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  equatable: ^2.0.5
  connectivity_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  very_good_analysis: ^10.0.0

flutter:
  uses-material-design: true
